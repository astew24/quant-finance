name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt

      - name: Run crypto_volatility tests
        run: python -m pytest crypto_volatility/tests/ -v --tb=short

      - name: Run factor_risk_model tests
        run: python -m pytest factor_risk_model/tests/ -v --tb=short

      - name: Run options_pricing tests
        run: python -m pytest options_pricing/tests/ -v --tb=short
